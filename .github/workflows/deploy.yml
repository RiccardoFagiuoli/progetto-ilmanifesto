name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main  # O 'master', il nome del tuo ramo principale

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npx ng build --configuration production --base-href /progetto-ilmanifesto/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/nome-della-tua-app/browser # Controlla il percorso esatto in dist/
          branch: gh-pages
